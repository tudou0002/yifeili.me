baseURL = "http://yifeili.me"
title = "Yifei Li's Website"
languageCode = "en-us"
theme = "devise"
relativeURLs = true
enableEmoji = true
googleAnalytics = ""
enableRobotsTXT = true
copyright = "&copy; Copyright 2026, Yifei Li"

# Main menu items under content/
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    title = "Posts"
    url = "/posts/"
    weight = -100

# Configuration Features
[params]
  description = "Yifei Li's Personal Website"      # Your meta description of the site
  header_title = "Yifei Li"                 # Your header title
  header_subtitle = "CS PhD @ UBC | Vancouver, BC" # Your header subtitle
  home_image = "/avatar.jpeg"          # Path to header image starting from the static directory (optional)
  recent_posts = 2                           # Max amount of recent posts to show
  mainSections = ["posts", "post", "blog"]   # Main sections to include in recent posts
  [params.style]                             # CSS style overrides
    backgroundColor = "#f8f9fa"
    homeImageBorderColor = "#ffffff"
    fontFamilyBase = "Helvetica Neue"        # First-choice font
    fontColor = "#212529"
  [[params.social]]
    fa_icon = "fab fa-github fa-1x"          # Font Awesome icon class
    href = "https://github.com/tudou0002"      # Link to associate with icon (http://, https://, mailto:)
  [[params.social]]
    fa_icon = "fab fa-linkedin-in fa-1x"
    href = "https://www.linkedin.com/in/yifeili2"
#  [[params.social]]
#    fa_icon = "fab fa-twitter fa-1x"
#    href = ""
  [[params.social]]
    fa_icon = "fab fa-google-scholar fa-1x"
    href = "https://scholar.google.ca/citations?user=01Vu9aoAAAAJ&hl=en"
  [[params.social]]
    fa_icon = "fas fa-at fa-1x"
    href = "mailto:yfli@cs.ubc.ca"
  